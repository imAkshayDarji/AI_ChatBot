name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/krystal_test
      PYTHONPATH: ./
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: krystal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d krystal_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install API dependencies
        run: pip install -r requirements.txt
      - name: Ruff
        run: python -m ruff check app/
      - name: Alembic migration check
        run: python -m alembic upgrade head
      - name: Pytest (exclude live OpenAI)
        run: python -m pytest app/tests/ -v -m "not openai"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run build

  deploy-backend:
    needs: backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy backend to Railway
        working-directory: apps/api
        run: railway up --service krystal-api --project 75cd113c-8996-49a3-bab2-69a1de980ef0 --environment production --ci
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    needs: frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm i -g vercel
      - name: Deploy frontend to Vercel
        working-directory: apps/web
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
